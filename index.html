<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONTAX CRM · Administración</title>
<style>
  :root{--bg:#0b141a;--panel:#111b21;--panel2:#182229;--line:#233138;--txt:#e9edef;--muted:#8696a0;--accent:#00a884;--green:#25d366;--navy:#1E2E52;--danger:#f15c6d;--warn:#f0b429}
  html.light{--bg:#eef1f5;--panel:#ffffff;--panel2:#f5f7f9;--line:#e2e5ea;--txt:#111b21;--muted:#667781;--green:#0a7d5a}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px}
  input,select{font-family:inherit}
  .hidden{display:none!important}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700}
  .brand svg{width:30px;height:32px}

  #login{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:30px;width:360px;max-width:92vw}
  .card .brand{font-size:20px;justify-content:center;margin-bottom:4px}
  .card p{color:var(--muted);font-size:13px;text-align:center;margin:0 0 20px}
  .card input{width:100%;padding:12px;margin-bottom:12px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:14px}
  .btn{background:var(--accent);color:#04231c;font-weight:600;font-size:14px;padding:12px 16px;border-radius:8px}
  .btn:hover{filter:brightness(1.1)}
  .btn.block{width:100%}
  .btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .msg{font-size:13px;margin-top:10px;min-height:18px}
  .msg.err{color:var(--danger)} .msg.ok{color:var(--green)}

  header.top{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10}
  header.top .brand{font-size:17px}
  header.top .right{display:flex;align-items:center;gap:10px}
  header.top .who{color:var(--muted);font-size:13px}
  header.top button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 12px;font-size:13px}
  nav.tabs{display:flex;gap:4px;padding:12px 24px 0;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
  nav.tabs button{background:none;color:var(--muted);padding:10px 16px;border-bottom:2px solid transparent;font-size:14px}
  nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
  main{padding:24px;max-width:1100px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.lead{color:var(--muted);margin:0 0 20px;font-size:13px}
  .view{display:none}.view.active{display:block}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.3px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;background:var(--muted)}
  .dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
  .pill{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .pill.admin{background:rgba(241,92,109,.15);color:#f19bb0}.pill.supervisor{background:rgba(127,191,224,.15);color:#8fc4e8}.pill.agent{background:rgba(37,211,102,.15);color:var(--green)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:24px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi .n{font-size:26px;font-weight:700}.kpi .l{color:var(--muted);font-size:12px;margin-top:4px}
  .formcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:18px;max-width:520px}
  .formcard label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .formcard input,.formcard select{width:100%;padding:10px;margin-bottom:14px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:14px}
  .note{color:var(--muted);font-size:12px;line-height:1.5}
  .mini{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:5px 10px;font-size:12px;border-radius:6px}
  .badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .badge.ok{background:rgba(37,211,102,.15);color:var(--green)}
  .badge.off{background:rgba(240,180,41,.16);color:var(--warn)}
  .badge.mut{background:rgba(134,150,160,.16);color:var(--muted)}
  .clienterow:hover{background:var(--panel2)}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:9px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:13px;font-family:inherit}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
  .fs{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .reveal{cursor:pointer;user-select:none}
  @media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="brand"><svg viewBox="0 0 150 160"><polyline points="82,14 26,80 82,146" fill="none" stroke="#1E2E52" stroke-width="27"/><polyline points="105,43 68,80 105,117" fill="none" stroke="#1E2E52" stroke-width="17"/><polygon points="100,80 127,53 127,69 112,80 127,91 127,107" fill="#808F9E"/><polygon points="112,80 127,91 127,107 100,80" fill="#0A0A0A"/></svg><span>CONTAX CRM</span></div>
    <p>Panel de administración</p>
    <input id="email" type="email" placeholder="correo@empresa.com" autocomplete="username" />
    <input id="password" type="password" placeholder="Contraseña / PIN" autocomplete="current-password" />
    <button class="btn block" id="loginBtn">Entrar</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header class="top">
    <div class="brand"><svg viewBox="0 0 150 160"><polyline points="82,14 26,80 82,146" fill="none" stroke="#1E2E52" stroke-width="27"/><polyline points="105,43 68,80 105,117" fill="none" stroke="#1E2E52" stroke-width="17"/><polygon points="100,80 127,53 127,69 112,80 127,91 127,107" fill="#808F9E"/><polygon points="112,80 127,91 127,107 100,80" fill="#0A0A0A"/></svg><span>CONTAX CRM · Admin</span></div>
    <div class="right">
      <span class="who" id="who"></span>
      <button id="themeBtn" title="Claro/oscuro">🌙</button>
      <button id="logoutBtn">Salir</button>
    </div>
  </header>
  <nav class="tabs">
    <button data-v="clientes" data-grp="portal">🗂️ Clientes</button>
    <button data-v="presence" data-grp="crm" class="active">🟢 Presencia</button>
    <button data-v="historial" data-grp="crm">📆 Historial</button>
    <button data-v="bandeja" data-grp="crm">📥 Bandeja</button>
    <button data-v="respuestas" data-grp="crm">⚡ Respuestas</button>
    <button data-v="reports" data-grp="crm">📊 Reportes</button>
    <button data-v="users" data-grp="admin">👥 Usuarios</button>
    <button data-v="config" data-grp="admin">⚙️ Configuración</button>
  </nav>
  <main>
    <div class="view" id="v-clientes"></div>
    <div class="view active" id="v-presence"></div>
    <div class="view" id="v-historial"></div>
    <div class="view" id="v-bandeja"></div>
    <div class="view" id="v-respuestas"></div>
    <div class="view" id="v-reports"></div>
    <div class="view" id="v-users"></div>
    <div class="view" id="v-config"></div>
  </main>
</div>

<!-- si entra un agente (no admin) -->
<div id="agentOnly" class="hidden" style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px">
  <div>
    <div class="brand" style="font-size:20px;justify-content:center;margin-bottom:10px"><svg viewBox="0 0 150 160" style="width:30px;height:32px"><polyline points="82,14 26,80 82,146" fill="none" stroke="#1E2E52" stroke-width="27"/><polyline points="105,43 68,80 105,117" fill="none" stroke="#1E2E52" stroke-width="17"/><polygon points="100,80 127,53 127,69 112,80 127,91 127,107" fill="#808F9E"/><polygon points="112,80 127,91 127,107 100,80" fill="#0A0A0A"/></svg><span>CONTAX CRM</span></div>
    <p style="color:var(--muted);max-width:380px">Tu cuenta es de agente. Trabaja desde la <b>extensión</b> en WhatsApp Web. Este panel es solo para administradores.</p>
    <button class="btn sec" id="agentLogout">Cerrar sesión</button>
  </div>
</div>

<script src="config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
